id: "SH-HS-MATH-HJ-B2-C07-L05-A01"
version: "0.1.0"
status: "draft"
resource_type: "applet"
title: "三角函数参数变化实验室"
subtitle: "分离观察 A、omega、phi 对 y = A sin(omega x + phi) 图像的影响"

curriculum:
  region: "上海"
  stage: "高中"
  subject: "数学"
  edition: "沪教版"
  volume_id: "B2"
  volume_title: "必修第二册"
  chapter_id: "SH-HS-MATH-HJ-B2-C07"
  chapter_title: "三角函数"
  section_id: "SH-HS-MATH-HJ-B2-C07-S03"
  section_title: "函数 y = A sin(omega x + phi) 的图像"
  lesson_id: "SH-HS-MATH-HJ-B2-C07-L05"
  textbook_ref: "7.3"
  lesson_title: "函数 y = A sin(omega x + phi) 的图像"

pedagogy:
  cognitive_action: "变换"
  estimated_classroom_minutes: 25
  primary_teaching_problem: "学生容易把横向伸缩、相位平移和括号内符号的关系搞反；多参数同时变化时认知负荷过高，难以从图像反推 A、omega、phi。"
  learning_goals:
    - "分别说明 A、omega、phi 对振幅、周期和相位平移的影响。"
    - "解释 y = A sin(omega x + phi) 的相位平移量为 -phi / omega。"
    - "通过单参数锁定和变换顺序比较，降低多参数同时变化的认知负荷。"
    - "根据关键点追踪，从图像反推 A、omega、phi 的可能取值。"
  prerequisites:
    - "正弦函数图像与性质"
    - "函数图像平移、伸缩和对称变换"
    - "周期、零点、最大值点和最小值点"
  successors:
    - "SH-HS-MATH-HJ-B2-C07-L05-M01"
    - "SH-HS-MATH-HJ-B2-C07-L05-D01"
    - "SH-HS-MATH-HJ-XB1-DERIV-K01"
  core_competencies:
    - "直观想象"
    - "数学抽象"
    - "数学建模"
    - "数学运算"

mathematical_scope:
  function: "y = A sin(omega x + phi)"
  independent_variable: "角 x 的弧度量"
  dependent_variable: "函数值 y"
  default_x_range: "-2pi <= x <= 2pi"
  parameter_defaults:
    A: 1
    omega: 1
    phi: 0
  parameter_ranges:
    A: "-2 <= A <= 2, A != 0 in discussion"
    omega: "0.5 <= omega <= 3, classroom default assumes omega > 0"
    phi: "-pi <= phi <= pi"
  derived_quantities:
    amplitude: "|A|"
    period: "2pi / omega"
    phase_shift: "-phi / omega"
  key_points:
    zeros: "omega x + phi = kpi"
    extrema: "omega x + phi = pi/2 + kpi"
  transformation_sequence:
    scale_then_shift: "y = sin x -> y = sin(omega x) -> y = sin(omega x + phi) -> y = A sin(omega x + phi)"
    shift_then_scale: "y = sin x -> y = sin(x + phi) -> y = sin(omega x + phi) -> y = A sin(omega x + phi)"
  out_of_scope:
    - "加入竖直平移 k 的系统讨论"
    - "余弦、正切参数函数的完整变换"
    - "用导数证明参数变换后的单调性"
    - "频率、相位在物理建模中的深度应用"

representations:
  - id: "base_curve"
    role: "显示 y = sin x 作为变换前的参照曲线。"
  - id: "transformed_curve"
    role: "显示 y = A sin(omega x + phi) 的当前图像。"
  - id: "parameter_controls"
    role: "通过 A、omega、phi 滑块分离观察参数影响。"
  - id: "sequence_trace"
    role: "显示选定变换顺序下的中间曲线或文字步骤。"
  - id: "key_point_tracker"
    role: "追踪零点、最值点和当前观察点的坐标。"
  - id: "parameter_summary"
    role: "同步显示振幅、周期和相位平移量。"

interaction_design:
  primary_control: "拖动图像上的观察点或调节 A、omega、phi 滑块，观察基本正弦曲线如何变成参数函数图像。"
  teacher_controls:
    - "播放或暂停观察点沿当前图像移动"
    - "重置到 A = 1, omega = 1, phi = 0"
    - "选择单参数观察模式：A、omega、phi 或自由组合"
    - "切换变换顺序：先横向伸缩后平移，或先平移后横向伸缩"
    - "显示或隐藏基本曲线、中间曲线、关键点和结论面板"
    - "调节 A、omega、phi 并同步显示振幅、周期、相位平移"
  student_controls:
    - "先锁定一个参数，预测图像变化后再移动滑块验证"
    - "拖动观察点，记录当前相位 omega x + phi 与函数值"
    - "根据关键点位置反推 A、omega、phi"
  staged_reveal:
    - step: "base_curve"
      description: "只显示 y = sin x 与当前参数函数重合的初始状态。"
    - step: "single_parameter"
      description: "依次锁定 A、omega、phi，分离观察振幅、周期和相位平移。"
    - step: "sequence_compare"
      description: "切换变换顺序，比较 phi 和 -phi / omega 的不同角色。"
    - step: "key_point_tracking"
      description: "显示零点和最值点，追踪图像反推参数的依据。"
    - step: "summary"
      description: "归纳 A、omega、phi 对图像的作用和常见误区。"

data_contract:
  state_variables:
    - name: "amplitude_a"
      unit: "unitless"
      value_type: "number"
      default: 1
      description: "参数 A，控制振幅和上下翻折。"
      persistence: "snapshot"
    - name: "omega"
      unit: "unitless"
      value_type: "number"
      default: 1
      description: "参数 omega，控制周期 2pi / omega。"
      persistence: "snapshot"
    - name: "phi"
      unit: "radian"
      value_type: "number"
      default: 0
      description: "参数 phi，参与相位 omega x + phi。"
      persistence: "snapshot"
    - name: "phase_shift"
      unit: "radian"
      value_type: "number"
      default: 0
      description: "相位平移量 -phi / omega。"
      persistence: "snapshot"
    - name: "current_x"
      unit: "radian"
      value_type: "number"
      default: 0
      description: "当前观察点横坐标。"
      persistence: "snapshot"
    - name: "current_y"
      unit: "unitless"
      value_type: "number"
      default: 0
      description: "当前观察点函数值。"
      persistence: "snapshot"
    - name: "focus_mode"
      value_type: "string"
      default: "free"
      description: "当前单参数观察模式：free、a、omega 或 phi。"
      persistence: "snapshot"
    - name: "sequence_mode"
      value_type: "string"
      default: "scale_then_shift"
      description: "当前显示的变换顺序。"
      persistence: "snapshot"
    - name: "base_curve_visible"
      value_type: "boolean"
      default: true
      description: "是否显示 y = sin x 参照曲线。"
      persistence: "snapshot"
    - name: "intermediate_curve_visible"
      value_type: "boolean"
      default: true
      description: "是否显示中间变换曲线。"
      persistence: "snapshot"
    - name: "key_points_visible"
      value_type: "boolean"
      default: true
      description: "是否显示零点和最值点。"
      persistence: "snapshot"
    - name: "summary_visible"
      value_type: "boolean"
      default: false
      description: "是否显示参数作用归纳。"
      persistence: "snapshot"
  events:
    - name: "parameters_changed"
      direction: "applet_to_player"
      description: "A、omega 或 phi 发生变化。"
      payload: ["amplitude_a", "omega", "phi", "phase_shift"]
    - name: "focus_mode_changed"
      direction: "applet_to_player"
      description: "教师切换单参数观察模式。"
      payload: ["focus_mode"]
    - name: "sequence_mode_changed"
      direction: "applet_to_player"
      description: "教师切换变换顺序。"
      payload: ["sequence_mode"]
    - name: "current_point_changed"
      direction: "applet_to_player"
      description: "当前观察点移动。"
      payload: ["current_x", "current_y"]
    - name: "layer_toggled"
      direction: "applet_to_player"
      description: "教师显示或隐藏图层。"
      payload: ["base_curve_visible", "intermediate_curve_visible", "key_points_visible", "summary_visible"]

feedback_and_diagnosis:
  success_evidence:
    - "学生能说明 A 改变振幅，A 为负时图像关于 x 轴翻折。"
    - "学生能从周期 T 反推 omega = 2pi / T。"
    - "学生能解释相位平移量是 -phi / omega，而不是简单地把 phi 当作右移量。"
    - "学生能在多参数同时变化时先分离参数，再综合判断图像。"
  common_error_tags:
    - id: "horizontal_scale_inverse"
      label: "把 omega 变大误认为周期变大"
    - id: "phase_direction_confusion"
      label: "把 phi 的符号与图像平移方向搞反"
    - id: "phase_shift_denominator_missing"
      label: "计算平移量时遗漏除以 omega"
    - id: "amplitude_reflection_ignored"
      label: "A 为负时忽略上下翻折"
    - id: "parameter_interference"
      label: "多个参数同时变化时不能分离判断依据"
  feedback_principles:
    - "反馈先锁定单一参数，再回到复合函数。"
    - "omega 的反馈必须回到周期 T = 2pi / omega。"
    - "phi 的反馈必须同时呈现括号内符号和最终平移量 -phi / omega。"
    - "从图像反推解析式时，先找振幅和周期，再用关键点判断相位。"

visual_semantics:
  base_curve: "灰蓝色虚线表示 y = sin x。"
  intermediate_curve: "浅绿色曲线表示当前变换顺序下的中间曲线。"
  transformed_curve: "深蓝色粗曲线表示 y = A sin(omega x + phi)。"
  current_point: "橙色动点表示当前观察点。"
  zero_points: "空心点表示当前图像零点。"
  extrema_points: "实心紫色点表示当前图像最值点。"
  amplitude_band: "淡蓝水平带表示振幅范围 [-|A|, |A|]。"
  phase_marker: "竖直标记表示相位平移量 -phi / omega。"
  rule: "颜色只用于区分数学对象和变换阶段，不作装饰。"

implementation:
  phase: "runnable_prototype"
  html_src_status: "runnable"
  planned_engine: "native-canvas-svg"
  create_src_in_later_task: false
  classroom_device_targets:
    - "教师电脑浏览器"
    - "教室大屏"
    - "触控屏或触控板"

files:
  readme: "README.md"
  teacher_script: "teacher-script.md"
  student_task: "student-task.md"
  review_record: "review.md"
  src_entry: "src/index.html"

compliance:
  copyright_note: "本资源包为原创教学脚本与交互实现，不复制教材正文、官方课件、教案或商业平台资源。"
  review_status: "self_checked_draft"
