schema_version: "0.1.0"
id: "SH-HS-MATH-HJ-B2-C07-L05-M01"
version: "0.1.0"
status: "draft"
resource_type: "manim_clip"
title: "图像变换顺序解释"
subtitle: "把 y = A sin(omega x + phi) 拆成横向伸缩、相位平移和纵向伸缩"

curriculum:
  region: "上海"
  stage: "高中"
  subject: "数学"
  edition: "沪教版"
  volume_id: "B2"
  volume_title: "必修第二册"
  chapter_id: "SH-HS-MATH-HJ-B2-C07"
  chapter_title: "三角函数"
  section_id: "SH-HS-MATH-HJ-B2-C07-S03"
  section_title: "函数 y = A sin(omega x + phi) 的图像"
  lesson_id: "SH-HS-MATH-HJ-B2-C07-L05"
  textbook_ref: "7.3"
  lesson_title: "函数 y = A sin(omega x + phi) 的图像"

pedagogy:
  cognitive_action: "分解"
  estimated_classroom_minutes: 5
  primary_teaching_problem: "学生容易把 omega x + phi 中的平移量看成 phi，忽略 omega 对输入轴的共同作用，导致横向伸缩、相位平移和振幅变化相互干扰。"
  learning_goals:
    - "把 omega x + phi 改写为 omega(x + phi / omega)，解释相位平移量来自 -phi / omega。"
    - "区分输入变换和输出变换：omega 与 phi 作用在横轴方向，A 作用在纵轴方向。"
    - "用一个样例图像读出振幅、周期和相位平移，并说明每一步变换的数学理由。"
  prerequisites:
    - "正弦函数图像与关键点"
    - "函数图像的平移、伸缩和翻折"
    - "周期与角度的弧度表示"
  successors:
    - "SH-HS-MATH-HJ-B2-C07-L05-A01"
    - "SH-HS-MATH-HJ-B2-C07-L05-D01"
    - "SH-HS-MATH-HJ-B2-C07-L06"
  core_competencies:
    - "直观想象"
    - "数学抽象"
    - "数学运算"
  classroom_use: "教师先播放约 1 分钟分解动画，在相位平移处暂停追问平移量；随后切到参数变化 Applet 让学生调节 A、omega、phi 验证。"

mathematical_scope:
  function: "y = A sin(omega x + phi)"
  sample_function: "y = -1.5 sin(2x + pi/2)"
  equivalent_form: "y = -1.5 sin(2(x + pi/4))"
  independent_variable: "x"
  dependent_variable: "y"
  parameter_constraints: "omega > 0 的首版课堂样例；A 可为负以展示关于 x 轴翻折。"
  target_transform_sequence:
    - "从 y = sin x 出发。"
    - "omega = 2 使周期从 2pi 变为 pi。"
    - "phi = pi/2 与 omega 共同决定向左平移 pi/4。"
    - "A = -1.5 先纵向放大到 1.5 倍，再关于 x 轴翻折。"
  key_readouts:
    amplitude: "1.5"
    period: "pi"
    phase_shift: "left pi/4"
  out_of_scope:
    - "竖直平移 k 的图像影响"
    - "omega < 0 时的等价化简"
    - "从任意图像唯一反求所有参数的完整算法"

representations:
  - id: "base_curve"
    role: "显示 y = sin x 的原始图像和关键点。"
  - id: "inside_factorization"
    role: "把 2x + pi/2 改写为 2(x + pi/4)，突出平移量。"
  - id: "horizontal_scale"
    role: "显示 omega 改变周期和关键点间距。"
  - id: "phase_shift"
    role: "显示向左 pi/4 的相位平移。"
  - id: "amplitude_reflection"
    role: "显示 A 的纵向伸缩和负号翻折。"
  - id: "readout_panel"
    role: "归纳振幅、周期和相位平移三个读数。"

narrative_design:
  target_duration_seconds: 55
  beats:
    - id: "name_the_problem"
      title: "先拆括号里的输入"
      purpose: "提醒学生不要把 phi 直接当作平移量。"
      visuals:
        - "同时显示 y = sin x 与目标 y = -1.5 sin(2x + pi/2)。"
        - "把 2x + pi/2 高亮为输入变换区域。"
      estimated_seconds: 7
    - id: "factor_phase_shift"
      title: "把 2x + pi/2 改写"
      purpose: "用 2(x + pi/4) 说明平移量是 -phi / omega。"
      visuals:
        - "公式从 2x + pi/2 变为 2(x + pi/4)。"
        - "平移箭头标注 left pi/4，而不是 left pi/2。"
      estimated_seconds: 10
    - id: "compress_period"
      title: "先看 omega 的横向伸缩"
      purpose: "让学生看见周期由 2pi 变为 pi。"
      visuals:
        - "基础正弦曲线横向压缩。"
        - "关键点间距缩短，一周期标注为 pi。"
      estimated_seconds: 12
    - id: "shift_phase"
      title: "再看相位平移"
      purpose: "把压缩后的曲线整体向左平移 pi/4。"
      visuals:
        - "曲线沿 x 轴向左移动。"
        - "虚线显示平移前后同一关键点的位置。"
      estimated_seconds: 10
    - id: "apply_amplitude"
      title: "最后看 A 的纵向作用"
      purpose: "展示 A = -1.5 同时带来纵向放大和关于 x 轴翻折。"
      visuals:
        - "曲线振幅变为 1.5。"
        - "负号导致曲线相对 x 轴上下翻折。"
      estimated_seconds: 11
    - id: "read_parameters_back"
      title: "从图像读回参数"
      purpose: "收束到参数识别：振幅、周期、平移量分别来自哪里。"
      visuals:
        - "右侧读数面板显示 amplitude = 1.5, period = pi, shift = left pi/4。"
        - "提示接到 Applet 中自行调参验证。"
      estimated_seconds: 5
  pause_points:
    - after_beat: "factor_phase_shift"
      teacher_prompt: "为什么这里向左移动 pi/4，而不是 pi/2？"
    - after_beat: "shift_phase"
      teacher_prompt: "如果先压缩再平移，关键点的位置和直接看括号有什么一致之处？"
    - after_beat: "apply_amplitude"
      teacher_prompt: "A 的负号改变的是横向位置，还是纵向方向？"

visual_semantics:
  base_curve: "蓝色表示 y = sin x 的基准图像。"
  transformed_curve: "红色表示当前已经完成的变换结果。"
  guide_lines: "灰色虚线只用于标记周期、平移量和振幅读数。"
  input_block: "公式中的 omega x + phi 用同一种强调色，表示它们共同作用在输入 x 上。"
  output_block: "公式前的 A 单独强调，表示它作用在输出 y 上。"
  rule: "颜色只表达数学对象和变换步骤，不作为装饰。"

