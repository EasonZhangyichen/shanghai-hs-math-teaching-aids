project:
  name: "沪教版高中数学数字教具云平台"
  stage: "高中"
  subject: "数学"
  edition: "沪教版"
  region: "上海"
  strategy: "课时知识图谱 + 多引擎微课件平台"

volumes:
  - id: "B1"
    title: "必修第一册"
    status: "needs_manual_verification"
    core_strands:
      - "集合与逻辑"
      - "等式与不等式"
      - "幂、指数与对数"
      - "函数"
  - id: "B2"
    title: "必修第二册"
    status: "mvp_focus"
    core_strands:
      - "三角"
      - "三角函数"
      - "平面向量"
      - "复数"
    chapters:
      - id: "SH-HS-MATH-HJ-B2-C07"
        number: 7
        title: "三角函数"
        status: "mvp_focus"
        verification:
          textbook_outline_status: "secondary_sources_checked"
          needs_manual_textbook_check: true
          checked_on: "2026-04-30"
          notes: "已用公开教材目录与课程资源目录交叉核对章节主干；课时划分和课时数仍需教师用纸质教材最终确认。"
        theme_strands:
          - "function"
          - "trig_vector_complex"
        chapter_role: "把第6章任意角三角比和三角公式转化为函数观点，为后续向量、复平面和周期模型建立图像语言。"
        prerequisite_knowledge:
          - id: "SH-HS-MATH-HJ-B2-C06-K01"
            title: "任意角与弧度制"
          - id: "SH-HS-MATH-HJ-B2-C06-K02"
            title: "单位圆中的正弦、余弦、正切"
          - id: "SH-HS-MATH-HJ-B2-C06-K03"
            title: "诱导公式与同角关系"
          - id: "SH-HS-MATH-HJ-B1-FUNC-K01"
            title: "函数图像、定义域、值域、单调性和奇偶性"
        follow_up_knowledge:
          - id: "SH-HS-MATH-HJ-B2-C08-K01"
            title: "平面向量的方向、投影和数量积"
          - id: "SH-HS-MATH-HJ-B2-C09-K01"
            title: "复数的几何意义与复平面"
          - id: "SH-HS-MATH-HJ-XB1-DERIV-K01"
            title: "函数变化率与周期函数的局部变化"
          - id: "SH-HS-MATH-HJ-MODEL-K01"
            title: "周期现象的函数建模"
        sections:
          - id: "SH-HS-MATH-HJ-B2-C07-S01"
            textbook_label: "7.1"
            title: "正弦函数的图像与性质"
            lesson_ids:
              - "SH-HS-MATH-HJ-B2-C07-L01"
              - "SH-HS-MATH-HJ-B2-C07-L02"
          - id: "SH-HS-MATH-HJ-B2-C07-S02"
            textbook_label: "7.2"
            title: "余弦函数的图像与性质"
            lesson_ids:
              - "SH-HS-MATH-HJ-B2-C07-L03"
              - "SH-HS-MATH-HJ-B2-C07-L04"
          - id: "SH-HS-MATH-HJ-B2-C07-S03"
            textbook_label: "7.3"
            title: "函数 y = A sin(omega x + phi) 的图像"
            lesson_ids:
              - "SH-HS-MATH-HJ-B2-C07-L05"
          - id: "SH-HS-MATH-HJ-B2-C07-S04"
            textbook_label: "7.4"
            title: "正切函数的图像与性质"
            lesson_ids:
              - "SH-HS-MATH-HJ-B2-C07-L06"
              - "SH-HS-MATH-HJ-B2-C07-L07"
        lessons:
          - id: "SH-HS-MATH-HJ-B2-C07-L01"
            textbook_ref: "7.1.1"
            title: "正弦函数的图像"
            status: "draft"
            estimated_periods: 1
            core_knowledge:
              - "用单位圆上点的纵坐标定义 y = sin x 的函数值"
              - "把角的变化、单位圆运动和坐标平面上的图像生成对应起来"
              - "识别正弦曲线的周期重复结构"
            prerequisites:
              - "弧度制和终边相同角"
              - "单位圆中的正弦定义"
              - "函数图像描点与坐标表示"
            successors:
              - "SH-HS-MATH-HJ-B2-C07-L02"
              - "SH-HS-MATH-HJ-B2-C07-L03"
              - "SH-HS-MATH-HJ-B2-C07-L05"
            teaching_pain_points:
              - "学生容易把正弦曲线当成静态形状，不能解释它从单位圆运动生成。"
              - "横轴的弧度量、单位圆转角和图像横坐标之间的对应关系容易断裂。"
              - "周期重复常被记忆为结论，缺少从旋转运动回到图像的理由。"
            digital_entry_points:
              - type: "applet"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L01-A01"
                title: "单位圆到正弦曲线"
                cognitive_action: "投影"
                note: "拖动单位圆动点，同步生成横坐标为角、纵坐标为正弦值的轨迹。"
              - type: "manim_clip"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L01-M01"
                title: "正弦曲线的来源"
                cognitive_action: "投影"
                note: "用一段短动画展示圆周运动展开为波形的过程。"
            diagnosis_focus:
              - "能否说明横坐标为什么是角的弧度量。"
              - "能否从单位圆位置判断正弦值符号和大小。"
            core_competencies:
              - "直观想象"
              - "数学抽象"
              - "数学建模"
          - id: "SH-HS-MATH-HJ-B2-C07-L02"
            textbook_ref: "7.1.2"
            title: "正弦函数的性质"
            status: "draft"
            estimated_periods: 1
            core_knowledge:
              - "正弦函数的定义域、值域、周期性、奇偶性、单调区间和最值"
              - "从单位圆与图像两种表征解释性质"
              - "用性质解决简单比较、求值和图像判断问题"
            prerequisites:
              - "正弦曲线的生成过程"
              - "函数性质的语言表达"
              - "诱导公式"
            successors:
              - "SH-HS-MATH-HJ-B2-C07-L03"
              - "SH-HS-MATH-HJ-B2-C07-L05"
              - "SH-HS-MATH-HJ-XB1-DERIV-K01"
            teaching_pain_points:
              - "学生会背周期和值域，但难以用图像解释单调区间端点。"
              - "奇偶性、对称轴、对称中心容易混淆。"
              - "最值点和零点的弧度表达容易出现周期遗漏。"
            digital_entry_points:
              - type: "applet"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L02-A01"
                title: "正弦函数性质探究"
                cognitive_action: "比较"
                note: "显示或隐藏周期段、单调段、对称元素和关键点，支持教师分步揭示。"
              - type: "diagnosis"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L02-D01"
                title: "正弦函数性质诊断"
                cognitive_action: "比较"
                note: "围绕周期遗漏、区间端点和对称性误判生成即时反馈。"
            diagnosis_focus:
              - "能否写出完整的一般解形式。"
              - "能否区分单调区间和局部观察区间。"
            core_competencies:
              - "逻辑推理"
              - "数学运算"
              - "直观想象"
          - id: "SH-HS-MATH-HJ-B2-C07-L03"
            textbook_ref: "7.2.1"
            title: "余弦函数的图像"
            status: "draft"
            estimated_periods: 1
            core_knowledge:
              - "用单位圆上点的横坐标定义 y = cos x 的函数值"
              - "通过相位平移理解余弦曲线与正弦曲线的关系"
              - "识别余弦曲线的关键点和周期结构"
            prerequisites:
              - "单位圆中的余弦定义"
              - "正弦函数图像"
              - "诱导公式和图像平移直觉"
            successors:
              - "SH-HS-MATH-HJ-B2-C07-L04"
              - "SH-HS-MATH-HJ-B2-C07-L05"
              - "SH-HS-MATH-HJ-B2-C08-K01"
            teaching_pain_points:
              - "学生容易把余弦图像机械看作正弦图像平移，忽略单位圆横坐标来源。"
              - "余弦图像关键点顺序与正弦图像混用。"
              - "相位平移的方向常与代数表达中的符号混淆。"
            digital_entry_points:
              - type: "applet"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L03-A01"
                title: "单位圆到余弦曲线"
                cognitive_action: "投影"
                note: "把单位圆横坐标投影到函数图像，并与正弦投影形成可切换对照。"
              - type: "applet"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L03-A02"
                title: "正弦与余弦相位对照"
                cognitive_action: "比较"
                note: "用同步游标展示 sin 与 cos 在同一角度下的坐标来源和图像位置。"
            diagnosis_focus:
              - "能否从单位圆判断余弦值的符号。"
              - "能否说清 cos x 与 sin x 的相位关系。"
            core_competencies:
              - "直观想象"
              - "数学抽象"
          - id: "SH-HS-MATH-HJ-B2-C07-L04"
            textbook_ref: "7.2.2"
            title: "余弦函数的性质"
            status: "draft"
            estimated_periods: 1
            core_knowledge:
              - "余弦函数的定义域、值域、周期性、奇偶性、单调区间和最值"
              - "用图像平移和单位圆解释性质差异"
              - "比较正弦函数与余弦函数的性质"
            prerequisites:
              - "余弦函数图像"
              - "正弦函数性质"
              - "函数奇偶性与周期性"
            successors:
              - "SH-HS-MATH-HJ-B2-C07-L05"
              - "SH-HS-MATH-HJ-B2-C08-K01"
            teaching_pain_points:
              - "学生常把正弦函数的奇偶性和单调区间直接套到余弦函数。"
              - "最大值点、最小值点和零点的一般形式容易漏写周期。"
              - "同一性质在单位圆和图像中的解释不能互相转换。"
            digital_entry_points:
              - type: "applet"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L04-A01"
                title: "正弦余弦性质对照板"
                cognitive_action: "比较"
                note: "并列联动关键点、单调段和对称元素，支持教师切换问题焦点。"
              - type: "diagnosis"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L04-D01"
                title: "余弦性质误区诊断"
                cognitive_action: "比较"
                note: "检测奇偶性、单调区间和关键点一般式的典型混淆。"
            diagnosis_focus:
              - "能否准确写出余弦函数单调区间。"
              - "能否区分余弦函数的偶函数性质与正弦函数的奇函数性质。"
            core_competencies:
              - "逻辑推理"
              - "数学运算"
              - "直观想象"
          - id: "SH-HS-MATH-HJ-B2-C07-L05"
            textbook_ref: "7.3"
            title: "函数 y = A sin(omega x + phi) 的图像"
            status: "draft"
            estimated_periods: 2
            core_knowledge:
              - "参数 A、omega、phi 对振幅、周期和相位的影响"
              - "从基本正弦曲线到复合参数图像的变换顺序"
              - "根据图像识别解析式中的关键参数"
            prerequisites:
              - "正弦函数图像与性质"
              - "函数图像平移、伸缩和对称变换"
              - "周期与关键点"
            successors:
              - "SH-HS-MATH-HJ-MODEL-K01"
              - "SH-HS-MATH-HJ-XB1-DERIV-K01"
              - "SH-HS-MATH-HJ-B2-C08-K01"
            teaching_pain_points:
              - "学生容易把横向伸缩、相位平移和括号内符号的关系搞反。"
              - "多参数同时变化时认知负荷过高，难以分辨每个参数的独立作用。"
              - "从图像反推解析式时，振幅、周期和初相位经常相互干扰。"
            digital_entry_points:
              - type: "applet"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L05-A01"
                title: "三角函数参数变化实验室"
                cognitive_action: "变换"
                note: "滑块控制 A、omega、phi，支持单参数锁定、变换顺序切换和关键点追踪；k 可作为平台扩展开关，默认对齐教材的无竖直平移形式。"
              - type: "manim_clip"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L05-M01"
                title: "图像变换顺序解释"
                cognitive_action: "分解"
                note: "把横向伸缩、平移和纵向伸缩拆成可暂停的连续变换。"
              - type: "diagnosis"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L05-D01"
                title: "参数识别诊断任务"
                cognitive_action: "比较"
                note: "给出图像关键点，要求判断 A、omega、phi 的可能取值并解释理由。"
            diagnosis_focus:
              - "能否从周期求出 omega 的绝对值。"
              - "能否解释相位平移方向而不是只套公式。"
              - "能否在 A 为负时正确处理图像翻折。"
            core_competencies:
              - "直观想象"
              - "数学抽象"
              - "数学建模"
              - "数学运算"
          - id: "SH-HS-MATH-HJ-B2-C07-L06"
            textbook_ref: "7.4.1"
            title: "正切函数的图像"
            status: "draft"
            estimated_periods: 1
            core_knowledge:
              - "用单位圆、终边斜率或正弦余弦比值理解 y = tan x"
              - "识别正切函数的定义域断点和渐近线"
              - "描绘一个周期内的正切曲线并延拓"
            prerequisites:
              - "任意角的正切定义"
              - "正弦、余弦函数图像与零点"
              - "函数定义域和间断点意识"
            successors:
              - "SH-HS-MATH-HJ-B2-C07-L07"
              - "SH-HS-MATH-HJ-XB1-DERIV-K01"
            teaching_pain_points:
              - "学生容易忽略正切函数定义域限制，把图像画成连续曲线。"
              - "渐近线来自 cos x = 0 的原因不清楚。"
              - "正切曲线的周期为 pi 容易被正弦余弦的 2pi 干扰。"
            digital_entry_points:
              - type: "applet"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L06-A01"
                title: "正切函数图像生成器"
                cognitive_action: "逼近"
                note: "联动单位圆、斜率线和正切图像，突出渐近线两侧的变化趋势。"
              - type: "manim_clip"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L06-M01"
                title: "为什么正切图像有渐近线"
                cognitive_action: "逼近"
                note: "从终边接近 y 轴时斜率变化解释图像趋向无穷。"
            diagnosis_focus:
              - "能否写出正切函数定义域。"
              - "能否解释渐近线位置。"
            core_competencies:
              - "直观想象"
              - "数学抽象"
              - "逻辑推理"
          - id: "SH-HS-MATH-HJ-B2-C07-L07"
            textbook_ref: "7.4.2"
            title: "正切函数的性质"
            status: "draft"
            estimated_periods: 1
            core_knowledge:
              - "正切函数的定义域、值域、周期性、奇偶性和单调性"
              - "正切函数在每个定义区间内的单调递增"
              - "正切性质与正弦、余弦性质的联系和差异"
            prerequisites:
              - "正切函数图像"
              - "渐近线与定义域"
              - "函数周期性和奇偶性"
            successors:
              - "SH-HS-MATH-HJ-XB1-DERIV-K01"
              - "SH-HS-MATH-HJ-MODEL-K01"
            teaching_pain_points:
              - "学生容易说正切函数在整个定义域上单调递增，忽略定义区间断裂。"
              - "值域为全体实数与渐近线限制看似矛盾，需用局部区间解释。"
              - "周期 pi、奇函数和单调区间的一般表达容易混淆。"
            digital_entry_points:
              - type: "applet"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L07-A01"
                title: "正切性质分段观察"
                cognitive_action: "比较"
                note: "按相邻定义区间分段高亮单调性、周期平移和奇对称。"
              - type: "diagnosis"
                proposed_resource_id: "SH-HS-MATH-HJ-B2-C07-L07-D01"
                title: "正切函数性质诊断"
                cognitive_action: "比较"
                note: "重点检测定义域、单调区间、周期和渐近线的综合判断。"
            diagnosis_focus:
              - "能否把单调性限定在每个连续定义区间。"
              - "能否写出正切函数周期与渐近线的一般式。"
            core_competencies:
              - "逻辑推理"
              - "数学运算"
              - "直观想象"
        chapter_resource_priorities:
          - lesson_id: "SH-HS-MATH-HJ-B2-C07-L01"
            priority: "mvp"
            reason: "单位圆到正弦曲线最能体现多表征联动价值。"
          - lesson_id: "SH-HS-MATH-HJ-B2-C07-L05"
            priority: "mvp"
            reason: "参数变换适合交互实验和诊断任务，是样板包的核心应用场景。"
          - lesson_id: "SH-HS-MATH-HJ-B2-C07-L06"
            priority: "follow_up"
            reason: "正切渐近线适合做第二批概念生成动画。"
  - id: "B3"
    title: "必修第三册"
    status: "needs_manual_verification"
    core_strands:
      - "空间直线与平面"
      - "简单几何体"
      - "概率初步"
      - "统计"
  - id: "B4"
    title: "必修第四册"
    status: "needs_manual_verification"
    core_strands:
      - "数学建模"
  - id: "XB1"
    title: "选择性必修第一册"
    status: "needs_manual_verification"
    core_strands:
      - "解析几何"
      - "圆锥曲线"
      - "空间向量"
      - "数列"
      - "导数"
  - id: "XB2"
    title: "选择性必修第二册"
    status: "needs_manual_verification"
    core_strands:
      - "计数原理"
      - "概率"
      - "成对数据统计分析"
      - "数学建模"
  - id: "XB3"
    title: "选择性必修第三册"
    status: "needs_manual_verification"
    core_strands:
      - "数学建模"

theme_strands:
  - id: "function"
    title: "函数链"
    examples:
      - "函数概念"
      - "指数函数"
      - "对数函数"
      - "三角函数"
      - "数列"
      - "导数"
  - id: "trig_vector_complex"
    title: "三角-向量-复数链"
    examples:
      - "弧度制"
      - "单位圆"
      - "三角函数图像"
      - "平面向量"
      - "复平面"
  - id: "geometry"
    title: "几何与代数链"
    examples:
      - "立体几何"
      - "直线与圆"
      - "圆锥曲线"
      - "空间向量"
  - id: "statistics_probability"
    title: "概率统计链"
